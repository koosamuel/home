<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구범용 | Portfolio</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,sans-serif;
            background:#f4f7fb;
            color:#333;
            line-height:1.6;
        }

        .hero{

            background:#2563eb;

            color:white;

            text-align:center;

            padding:60px 20px;

        }

        .subtitle{

            font-size:1.3rem;

            margin:10px 0;

        }

        button{

            margin-top:20px;

            padding:10px 20px;

            border:none;

            border-radius:8px;

            background:white;

            color:#2563eb;

            cursor:pointer;

            font-size:16px;

        }

        button:hover{

            background:#e5e7eb;

        }

        #message{

            margin-top:15px;

            font-weight:bold;

        }

        .container{

            max-width:1000px;

            margin:30px auto;

            padding:0 20px;

        }

        .card{

            background:white;

            padding:25px;

            border-radius:12px;

            margin-bottom:20px;

            box-shadow:0 3px 10px rgba(0,0,0,.1);

        }

        .card h2{

            color:#2563eb;

            margin-bottom:15px;

        }

        .skills{

            display:flex;

            flex-wrap:wrap;

            gap:10px;

            margin-top:15px;

        }

        .skills span{

            background:#2563eb;

            color:white;

            padding:8px 14px;

            border-radius:20px;

        }

        footer{

            background:#1f2937;

            color:white;

            text-align:center;

            padding:20px;

            margin-top:30px;

        }

    </style>

</head>

<body>

    <header class="hero">

        <h1>👋 구범용</h1>

        <p class="subtitle">

            AI · Data · FinTech Developer

        </p>

        <button onclick="sayHello()">

            인사하기

        </button>

        <p id="message"></p>

    </header>

    <div class="container">

        <section class="card">

            <h2>About Me</h2>

            <p>

                Computer Vision 개발과 금융 IT 경험을 바탕으로

                데이터 분석과 AI를 공부하고 있습니다.

            </p>

        </section>

        <section class="card">

            <h2>Skills</h2>

            <div class="skills">

                <span>Python</span>

                <span>SQL</span>

                <span>HTML</span>

                <span>CSS</span>

                <span>JavaScript</span>

                <span>FastAPI</span>

                <span>Git</span>

            </div>

        </section>

        <section class="card">

            <h2>Experience</h2>

            <ul>

                <li>Computer Vision 개발</li>

                <li>금융 자동화 시스템 개발</li>

                <li>데이터 분석 프로젝트</li>

            </ul>

        </section>

    </div>

    <footer>

        © 2026 Koo Beom Yong

    </footer>

    <script>

        function sayHello(){

            document.getElementById("message").innerHTML =
            "방문해 주셔서 감사합니다! 😊";

        }

    </script>

</body>
</html>
